spring.application.name=FYPals

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=fypals;encrypt=false;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=Admin1234!
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

jwt.secret=fypalssupersecretkey1234567890abcdef
# Changed from 86400000 (24h) to 7200000 (2h)
jwt.expiration=7200000

spring.config.import=optional:classpath:application-local.properties

# Email (for DeadlineReminderJob) — fill in your Gmail credentials
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_EMAIL_HERE
spring.mail.password=YOUR_APP_PASSWORD_HERE
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Fix: serialize LocalDate/LocalDateTime as ISO-8601 strings, not arrays
spring.jackson.serialization.write-dates-as-timestamps=false

